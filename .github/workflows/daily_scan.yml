name: Scan Quotidien
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Crucial pour pouvoir sauvegarder le fichier
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests
      - name: Run script
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python Main.py
      - name: Commit et push
        run: |
          git config --global user.name "Bot Automatique"
          git config --global user.email "bot@github.com"
          git add resultats_analyse.txt
          git commit -m "Mise à jour automatique des analyses" || exit 0
          git push
